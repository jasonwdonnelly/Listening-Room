<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:       #f1e8d3;
    --paper-soft:  #f6efde;
    --paper-deep:  #ebe1c9;
    --ink:         #1c1814;
    --ink-soft:    #443a30;
    --ink-faint:   #6b5d4e;
    --muted:       #95876f;
    --accent:      #8b3a2e;
    --accent-soft: rgba(139, 58, 46, 0.10);
    --rule:        rgba(28, 24, 20, 0.12);
    --rule-soft:   rgba(28, 24, 20, 0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    font-feature-settings: "liga", "dlig";
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    /* paper texture */
    background-image:
      radial-gradient(circle at 20% 30%, rgba(139, 58, 46, 0.025) 0, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(28, 24, 20, 0.02) 0, transparent 50%);
  }

  /* ============ HEADER ============ */
  header {
    flex: 0 0 auto;
    padding: 1.1rem 2rem;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 2rem;
  }

  .brand {
    font-variation-settings: "opsz" 144, "wght" 600, "SOFT" 0;
    font-size: 1.35rem;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .brand em {
    font-style: italic;
    font-variation-settings: "opsz" 144, "wght" 400, "SOFT" 100;
    color: var(--accent);
  }

  .book-title {
    font-style: italic;
    color: var(--ink-soft);
    font-variation-settings: "opsz" 14, "wght" 400;
    font-size: 0.95rem;
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
    max-width: 50ch;
  }

  /* ============ READER ============ */
  .reader {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 4rem clamp(1.5rem, 8vw, 6rem);
    scroll-behavior: smooth;
    position: relative;
  }
  .reader::-webkit-scrollbar { width: 8px; }
  .reader::-webkit-scrollbar-track { background: transparent; }
  .reader::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 4px; }
  .reader::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }

  .reader.dragover {
    background: var(--paper-soft);
  }
  .reader.dragover::after {
    content: "Drop it.";
    position: absolute;
    inset: 1.5rem;
    border: 2px dashed var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-size: 2rem;
    font-style: italic;
    pointer-events: none;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    gap: 1.4rem;
  }
  .empty-state h2 {
    font-variation-settings: "opsz" 144, "wght" 300, "SOFT" 50;
    font-size: clamp(2.4rem, 5vw, 4rem);
    line-height: 1.05;
    letter-spacing: -0.03em;
    max-width: 18ch;
  }
  .empty-state h2 em {
    font-style: italic;
    color: var(--accent);
    font-variation-settings: "opsz" 144, "wght" 300, "SOFT" 100;
  }
  .empty-state p {
    color: var(--ink-faint);
    max-width: 42ch;
    font-size: 1.05rem;
    line-height: 1.55;
    font-variation-settings: "opsz" 14, "wght" 400;
  }
  .upload-btn {
    margin-top: 0.5rem;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 0.85rem 1.75rem;
    font-family: inherit;
    font-size: 1rem;
    font-variation-settings: "opsz" 14, "wght" 500;
    letter-spacing: 0.01em;
    cursor: pointer;
    border-radius: 999px;
    transition: transform 0.15s ease, background 0.2s ease;
  }
  .upload-btn:hover {
    background: var(--accent);
    transform: translateY(-1px);
  }
  .file-hint {
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
    letter-spacing: 0.02em;
  }

  /* Book content */
  .book-content {
    max-width: 38rem;
    margin: 0 auto;
    font-variation-settings: "opsz" 14, "wght" 400;
    font-size: 1.2rem;
    line-height: 1.78;
    color: var(--ink-soft);
  }
  .book-content p {
    margin-bottom: 1.4em;
    text-indent: 1.8em;
  }
  .book-content p:first-child,
  .book-content h1 + p,
  .book-content h2 + p,
  .book-content h3 + p {
    text-indent: 0;
  }
  .book-content h1, .book-content h2, .book-content h3 {
    font-variation-settings: "opsz" 144, "wght" 600, "SOFT" 0;
    color: var(--ink);
    margin: 2.5em 0 1em;
    text-align: center;
    line-height: 1.2;
    letter-spacing: -0.01em;
  }
  .book-content h1 { font-size: 2.2rem; }
  .book-content h2 { font-size: 1.7rem; }
  .book-content h3 { font-size: 1.3rem; font-style: italic; }

  .sentence {
    transition: background 0.35s ease, color 0.35s ease, box-shadow 0.35s ease;
    border-radius: 3px;
    padding: 0 2px;
    margin: 0 -2px;
    cursor: pointer;
  }
  .sentence:hover { color: var(--ink); }
  .sentence.active {
    background: var(--accent-soft);
    color: var(--ink);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60vh;
    color: var(--ink-faint);
    font-style: italic;
    font-size: 1.1rem;
  }

  /* ============ CONTROLS ============ */
  .controls {
    flex: 0 0 auto;
    background: var(--paper-soft);
    border-top: 1px solid var(--rule);
    padding: 1rem 2rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .time {
    font-variation-settings: "opsz" 9, "wght" 400;
    font-size: 0.78rem;
    color: var(--ink-faint);
    font-variant-numeric: tabular-nums;
    min-width: 4ch;
    font-feature-settings: "tnum";
  }
  .time.right { text-align: right; }
  .progress {
    flex: 1;
    height: 3px;
    background: var(--rule);
    border-radius: 999px;
    position: relative;
    cursor: pointer;
  }
  .progress:hover { height: 5px; transition: height 0.15s ease; }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    width: 0%;
    transition: width 0.4s ease;
  }

  .transport {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 1rem;
  }
  .transport-buttons {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    justify-content: center;
  }

  .icon-btn {
    background: transparent;
    border: none;
    color: var(--ink);
    cursor: pointer;
    padding: 0.55rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, transform 0.1s ease, color 0.15s ease;
  }
  .icon-btn:hover { background: var(--rule); }
  .icon-btn:active { transform: scale(0.93); }
  .icon-btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }
  .icon-btn:disabled:hover { background: transparent; }
  .icon-btn svg { width: 20px; height: 20px; }

  .play-btn {
    width: 54px;
    height: 54px;
    background: var(--ink);
    color: var(--paper);
    margin: 0 0.4rem;
  }
  .play-btn:hover:not(:disabled) {
    background: var(--accent);
  }
  .play-btn svg { width: 22px; height: 22px; }

  .right-tools {
    display: flex;
    justify-content: flex-end;
    gap: 0.4rem;
  }

  .settings {
    display: flex;
    gap: 1.25rem;
    align-items: center;
  }
  .settings label {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    color: var(--muted);
    font-variation-settings: "opsz" 9, "wght" 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 0.65rem;
  }
  .settings select {
    background: transparent;
    border: none;
    color: var(--ink);
    font-family: inherit;
    font-size: 0.95rem;
    font-style: italic;
    cursor: pointer;
    padding: 0;
    max-width: 13rem;
    text-overflow: ellipsis;
  }
  .settings select:focus {
    outline: none;
    color: var(--accent);
  }

  #file-input { display: none; }

  /* ============ MOBILE ============ */
  @media (max-width: 720px) {
    header {
      padding: 0.9rem 1.25rem;
      flex-direction: column;
      gap: 0.3rem;
      align-items: flex-start;
    }
    .reader { padding: 2rem 1.5rem; }
    .book-content { font-size: 1.08rem; line-height: 1.7; }
    .controls { padding: 0.85rem 1.25rem 1rem; gap: 0.65rem; }
    .transport { grid-template-columns: 1fr; gap: 0.6rem; }
    .settings { justify-content: center; gap: 1.5rem; }
    .right-tools { justify-content: center; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">Listening <em>Room</em></div>
  <div class="book-title" id="book-title"></div>
</header>

<section class="reader" id="reader">
  <div class="empty-state" id="empty-state">
    <h2>Hear what you've <em>written.</em></h2>
    <p>Drop in a manuscript or open one from your machine. We'll read it back, sentence by sentence, in the voice you choose.</p>
    <button class="upload-btn" id="open-btn">Open a document</button>
    <span class="file-hint">.docx &middot; .txt &middot; .md</span>
  </div>
  <div class="book-content" id="book-content" style="display:none;"></div>
</section>

<footer class="controls">
  <div class="progress-row">
    <span class="time" id="time-current">0%</span>
    <div class="progress" id="progress">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <span class="time right" id="time-total">—</span>
  </div>
  <div class="transport">
    <div class="settings">
      <label>
        Voice
        <select id="voice-select"><option>Loading…</option></select>
      </label>
      <label>
        Speed
        <select id="rate-select">
          <option value="0.75">0.75&times;</option>
          <option value="0.9">0.9&times;</option>
          <option value="1" selected>1&times;</option>
          <option value="1.15">1.15&times;</option>
          <option value="1.3">1.3&times;</option>
          <option value="1.5">1.5&times;</option>
          <option value="1.75">1.75&times;</option>
          <option value="2">2&times;</option>
        </select>
      </label>
    </div>
    <div class="transport-buttons">
      <button class="icon-btn" id="prev-btn" title="Previous sentence (←)" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="18 19 8 12 18 5"/><rect x="4" y="5" width="2" height="14"/></svg>
      </button>
      <button class="icon-btn play-btn" id="play-btn" disabled title="Play (space)">
        <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20"/></svg>
        <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="icon-btn" id="next-btn" title="Next sentence (→)" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 5 16 12 6 19"/><rect x="18" y="5" width="2" height="14"/></svg>
      </button>
    </div>
    <div class="right-tools">
      <button class="icon-btn" id="open-icon-btn" title="Open new document">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </button>
    </div>
  </div>
</footer>

<input type="file" id="file-input" accept=".docx,.txt,.md" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script>
(function() {
  'use strict';

  const synth = window.speechSynthesis;
  let voices = [];
  let sentences = [];
  let currentIndex = 0;
  let isPlaying = false;
  let currentUtterance = null;
  let watchdogTimer = null;
  let bookKey = null;

  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  const $ = id => document.getElementById(id);
  const el = {
    reader:       $('reader'),
    emptyState:   $('empty-state'),
    content:      $('book-content'),
    bookTitle:    $('book-title'),
    playBtn:      $('play-btn'),
    prevBtn:      $('prev-btn'),
    nextBtn:      $('next-btn'),
    playIcon:     $('play-icon'),
    pauseIcon:    $('pause-icon'),
    voiceSelect:  $('voice-select'),
    rateSelect:   $('rate-select'),
    progress:     $('progress'),
    progressFill: $('progress-fill'),
    timeCurrent:  $('time-current'),
    timeTotal:    $('time-total'),
    fileInput:    $('file-input'),
    openBtn:      $('open-btn'),
    openIconBtn:  $('open-icon-btn'),
  };

  /* ============ IN-MEMORY STORAGE ============ */
  // In-session only. Reading position is remembered per book during this session,
  // but resets when the page reloads.
  const memStore = new Map();

  function sanitizeKey(s) {
    return s.replace(/[\s\/\\'"]/g, '_').slice(0, 180);
  }

  function storageGet(key) {
    return memStore.has(key) ? memStore.get(key) : null;
  }

  function storageSet(key, value) {
    memStore.set(key, value);
  }

  /* ============ VOICES ============ */
  function loadVoices() {
    const all = synth.getVoices();
    if (!all || all.length === 0) return; // wait for voices to populate

    // Show ALL voices — don't filter. Some browsers have weird lang codes
    // and we don't want to accidentally hide good ones (like Google UK English Female).
    voices = all.slice();

    // Sort: Google UK English Female first, then en-GB, then en-*, then everything else
    voices.sort((a, b) => {
      const score = v => {
        if (v.name === 'Google UK English Female') return 0;
        if (v.name === 'Google UK English Male') return 1;
        if (/en[-_]GB/i.test(v.lang)) return 2;
        if (/^en/i.test(v.lang)) return 3;
        return 4;
      };
      const sa = score(a), sb = score(b);
      if (sa !== sb) return sa - sb;
      return a.name.localeCompare(b.name);
    });

    // Preserve current selection across re-renders
    const currentName = voices[el.voiceSelect.value]
      ? voices[el.voiceSelect.value].name
      : null;

    el.voiceSelect.innerHTML = '';
    voices.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      const langTag = (v.lang || '').replace('_', '-').toUpperCase();
      opt.textContent = langTag ? `${v.name} · ${langTag}` : v.name;
      el.voiceSelect.appendChild(opt);
    });

    if (currentName) {
      const idx = voices.findIndex(v => v.name === currentName);
      if (idx >= 0) el.voiceSelect.value = idx;
    }

    restorePreferences();
  }

  if (synth.onvoiceschanged !== undefined) {
    synth.onvoiceschanged = loadVoices;
  }
  loadVoices();
  // Poll a few times — some browsers (especially Chrome) load Google voices
  // asynchronously and onvoiceschanged doesn't always fire reliably
  [100, 500, 1500, 3000].forEach(ms => setTimeout(loadVoices, ms));

  /* ============ PREFERENCES ============ */
  function restorePreferences() {
    const savedVoice = storageGet('pref-voice');
    if (savedVoice) {
      const idx = voices.findIndex(v => v.name === savedVoice);
      if (idx >= 0) {
        el.voiceSelect.value = idx;
      } else {
        pickDefaultVoice();
      }
    } else {
      pickDefaultVoice();
    }
    const savedRate = storageGet('pref-rate');
    if (savedRate) el.rateSelect.value = savedRate;
  }

  function pickDefaultVoice() {
    // Preference order: Google UK English Female → any en-GB female →
    // any en-GB → first voice in list
    const preferred = [
      v => v.name === 'Google UK English Female',
      v => /en[-_]GB/i.test(v.lang) && /female/i.test(v.name),
      v => /en[-_]GB/i.test(v.lang),
    ];
    for (const test of preferred) {
      const idx = voices.findIndex(test);
      if (idx >= 0) {
        el.voiceSelect.value = idx;
        return;
      }
    }
  }

  el.voiceSelect.addEventListener('change', () => {
    const v = voices[el.voiceSelect.value];
    if (v) storageSet('pref-voice', v.name);
  });

  el.rateSelect.addEventListener('change', () => {
    storageSet('pref-rate', el.rateSelect.value);
    if (isPlaying) {
      synth.cancel();
      speakSentence(currentIndex);
    }
  });

  /* ============ FILE HANDLING ============ */
  el.openBtn.addEventListener('click', () => el.fileInput.click());
  el.openIconBtn.addEventListener('click', () => el.fileInput.click());

  el.fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (file) await loadFile(file);
    e.target.value = ''; // allow same file re-upload
  });

  // Drag and drop
  el.reader.addEventListener('dragover', (e) => {
    e.preventDefault();
    el.reader.classList.add('dragover');
  });
  el.reader.addEventListener('dragleave', (e) => {
    if (e.target === el.reader) el.reader.classList.remove('dragover');
  });
  el.reader.addEventListener('drop', async (e) => {
    e.preventDefault();
    el.reader.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) await loadFile(file);
  });

  async function loadFile(file) {
    stopPlayback();

    el.bookTitle.textContent = file.name.replace(/\.[^.]+$/, '');
    el.emptyState.style.display = 'none';
    el.content.style.display = 'block';
    el.content.innerHTML = '<div class="loading">Opening…</div>';

    bookKey = 'pos_' + sanitizeKey(file.name + '_' + file.size);

    let text = '';
    const ext = (file.name.split('.').pop() || '').toLowerCase();

    try {
      if (ext === 'docx') {
        const arrayBuffer = await file.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer });
        text = result.value;
      } else {
        text = await file.text();
      }
    } catch (err) {
      el.content.innerHTML =
        '<div class="loading">Couldn\'t open this file. ' +
        (err && err.message ? err.message : '') +
        '</div>';
      return;
    }

    if (!text || !text.trim()) {
      el.content.innerHTML = '<div class="loading">This file is empty.</div>';
      return;
    }

    processText(text);

    // Restore reading position for this book (in-session only)
    const savedPos = storageGet(bookKey);
    if (typeof savedPos === 'number' && savedPos > 0 && savedPos < sentences.length) {
      currentIndex = savedPos;
      highlightSentence(currentIndex, false);
      updateProgress();
      setTimeout(() => scrollToActive(true), 80);
    }

    enableControls();
  }

  /* ============ TEXT PROCESSING ============ */
  function processText(text) {
    // Normalize line endings, collapse 3+ blanks
    text = text.replace(/\r\n/g, '\n').replace(/\n{3,}/g, '\n\n');
    const paragraphs = text.split(/\n\s*\n/).map(p => p.trim()).filter(Boolean);

    sentences = [];
    const fragments = [];
    const useSegmenter = (typeof Intl !== 'undefined' && Intl.Segmenter);
    const segmenter = useSegmenter
      ? new Intl.Segmenter('en', { granularity: 'sentence' })
      : null;

    paragraphs.forEach(para => {
      // Replace internal single newlines with space (e.g. soft wraps)
      const cleaned = para.replace(/\n+/g, ' ').replace(/\s+/g, ' ').trim();
      if (!cleaned) return;

      let paraSentences;
      if (segmenter) {
        paraSentences = [...segmenter.segment(cleaned)]
          .map(s => s.segment.trim())
          .filter(Boolean);
      } else {
        paraSentences = (cleaned.match(/[^.!?]+[.!?]*\s*/g) || [cleaned])
          .map(s => s.trim()).filter(Boolean);
      }

      // Heading heuristic: short, no terminal punctuation, single sentence
      const isHeading =
        cleaned.length < 80 &&
        !/[.!?:]$/.test(cleaned) &&
        paraSentences.length === 1;

      const tag = isHeading
        ? (cleaned.length < 25 ? 'h1' : (cleaned.length < 50 ? 'h2' : 'h3'))
        : 'p';

      let html = `<${tag}>`;
      paraSentences.forEach(sent => {
        const idx = sentences.length;
        sentences.push(sent);
        html += `<span class="sentence" data-idx="${idx}">${escapeHtml(sent)}</span> `;
      });
      html += `</${tag}>`;
      fragments.push(html);
    });

    el.content.innerHTML = fragments.join('');
    currentIndex = 0;
    updateProgress();

    // Click any sentence to jump there
    el.content.addEventListener('click', (e) => {
      const span = e.target.closest('.sentence');
      if (span) {
        const idx = parseInt(span.dataset.idx, 10);
        if (!isNaN(idx)) jumpTo(idx);
      }
    });
  }

  function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  /* ============ PLAYBACK ============ */
  function enableControls() {
    el.playBtn.disabled = false;
    el.prevBtn.disabled = false;
    el.nextBtn.disabled = false;
  }

  function togglePlay() {
    if (sentences.length === 0) return;
    if (isPlaying) pause();
    else play();
  }

  function play() {
    if (sentences.length === 0) return;
    if (currentIndex >= sentences.length) currentIndex = 0;
    isPlaying = true;
    el.playIcon.style.display = 'none';
    el.pauseIcon.style.display = 'block';
    speakSentence(currentIndex);
  }

  function pause() {
    isPlaying = false;
    el.playIcon.style.display = 'block';
    el.pauseIcon.style.display = 'none';
    clearWatchdog();
    synth.cancel();
  }

  function stopPlayback() {
    isPlaying = false;
    clearWatchdog();
    synth.cancel();
    el.playIcon.style.display = 'block';
    el.pauseIcon.style.display = 'none';
  }

  function clearWatchdog() {
    if (watchdogTimer) {
      clearTimeout(watchdogTimer);
      watchdogTimer = null;
    }
  }

  function speakSentence(idx) {
    clearWatchdog();
    if (idx >= sentences.length) {
      pause();
      currentIndex = sentences.length - 1;
      return;
    }
    currentIndex = idx;
    const text = sentences[idx];
    const utt = new SpeechSynthesisUtterance(text);
    const voice = voices[el.voiceSelect.value];
    if (voice) utt.voice = voice;
    const rate = parseFloat(el.rateSelect.value) || 1;
    utt.rate = rate;
    utt.pitch = 1;
    utt.volume = 1;

    let advanced = false;
    const advance = () => {
      if (advanced) return;
      advanced = true;
      clearWatchdog();
      if (isPlaying && currentUtterance === utt) {
        currentIndex++;
        savePosition();
        if (currentIndex < sentences.length) {
          // Tiny delay helps iOS Safari chain utterances reliably
          setTimeout(() => {
            if (isPlaying) speakSentence(currentIndex);
          }, isIOS ? 80 : 0);
        } else {
          pause();
        }
      }
    };

    utt.onend = advance;

    utt.onerror = (e) => {
      if (e.error && e.error !== 'canceled' && e.error !== 'interrupted') {
        console.warn('Speech error:', e.error);
        // On real errors, try to keep going rather than die silently
        advance();
      }
    };

    currentUtterance = utt;
    highlightSentence(idx, true);
    updateProgress();
    synth.speak(utt);

    // Watchdog: estimate max duration based on text length and rate.
    // English speech ≈ 12-15 chars/sec at 1x. Use generous 8 chars/sec + 4s buffer.
    const estimatedMs = (text.length / (8 * rate)) * 1000 + 4000;
    const maxMs = Math.max(estimatedMs, 6000); // never less than 6s
    watchdogTimer = setTimeout(() => {
      // If onend hasn't fired, force the chain forward
      if (!advanced && isPlaying && currentUtterance === utt) {
        try { synth.cancel(); } catch (e) {}
        advance();
      }
    }, maxMs);
  }

  function highlightSentence(idx, scroll) {
    const prev = el.content.querySelector('.sentence.active');
    if (prev) prev.classList.remove('active');
    const next = el.content.querySelector(`.sentence[data-idx="${idx}"]`);
    if (next) {
      next.classList.add('active');
      if (scroll) scrollToActive();
    }
  }

  function scrollToActive(instant) {
    const node = el.content.querySelector('.sentence.active');
    if (node) {
      node.scrollIntoView({
        behavior: instant ? 'auto' : 'smooth',
        block: 'center'
      });
    }
  }

  function nextSentence() {
    if (sentences.length === 0) return;
    const wasPlaying = isPlaying;
    synth.cancel();
    currentIndex = Math.min(currentIndex + 1, sentences.length - 1);
    if (wasPlaying) {
      speakSentence(currentIndex);
    } else {
      highlightSentence(currentIndex, true);
      updateProgress();
      savePosition();
    }
  }

  function prevSentence() {
    if (sentences.length === 0) return;
    const wasPlaying = isPlaying;
    synth.cancel();
    currentIndex = Math.max(currentIndex - 1, 0);
    if (wasPlaying) {
      speakSentence(currentIndex);
    } else {
      highlightSentence(currentIndex, true);
      updateProgress();
      savePosition();
    }
  }

  function jumpTo(idx) {
    if (sentences.length === 0) return;
    const wasPlaying = isPlaying;
    synth.cancel();
    currentIndex = Math.max(0, Math.min(idx, sentences.length - 1));
    if (wasPlaying) {
      speakSentence(currentIndex);
    } else {
      highlightSentence(currentIndex, true);
      updateProgress();
      savePosition();
    }
  }

  function seekTo(e) {
    if (sentences.length === 0) return;
    const rect = el.progress.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    jumpTo(Math.floor(pct * sentences.length));
  }

  el.progress.addEventListener('click', seekTo);

  function updateProgress() {
    const pct = sentences.length ? (currentIndex / sentences.length) * 100 : 0;
    el.progressFill.style.width = pct + '%';
    el.timeCurrent.textContent = Math.floor(pct) + '%';
    el.timeTotal.textContent = sentences.length
      ? sentences.length + ' lines'
      : '—';
  }

  function savePosition() {
    if (bookKey) storageSet(bookKey, currentIndex);
  }

  /* ============ BUTTONS ============ */
  el.playBtn.addEventListener('click', togglePlay);
  el.prevBtn.addEventListener('click', prevSentence);
  el.nextBtn.addEventListener('click', nextSentence);

  /* ============ KEYBOARD ============ */
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    else if (e.code === 'ArrowRight') { e.preventDefault(); nextSentence(); }
    else if (e.code === 'ArrowLeft') { e.preventDefault(); prevSentence(); }
  });

  /* ============ CHROME LONG-UTTERANCE FIX ============ */
  // Chrome desktop silently stops synthesis after ~15s. Pulse pause/resume.
  // Skip on iOS — there it actively causes audio to drop mid-sentence.
  if (!isIOS) {
    setInterval(() => {
      if (isPlaying && synth.speaking) {
        synth.pause();
        synth.resume();
      }
    }, 10000);
  }

  /* ============ STOP ON UNLOAD ============ */
  window.addEventListener('beforeunload', () => synth.cancel());

})();
</script>
</body>
</html>
