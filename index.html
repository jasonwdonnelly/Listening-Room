<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:       #f1e8d3;
    --paper-soft:  #f6efde;
    --paper-deep:  #eadfc6;
    --ink:         #1c1814;
    --ink-soft:    #443a30;
    --ink-faint:   #6b5d4e;
    --muted:       #95876f;
    --accent:      #8b3a2e;
    --accent-soft: rgba(139, 58, 46, 0.10);
    --rule:        rgba(28, 24, 20, 0.12);
    --rule-soft:   rgba(28, 24, 20, 0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    font-feature-settings: "liga", "dlig";
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(139, 58, 46, 0.025) 0, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(28, 24, 20, 0.02) 0, transparent 50%);
  }

  /* ============ HEADER ============ */
  header {
    flex: 0 0 auto;
    padding: 1.1rem 1.5rem;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    min-width: 0;
  }
  .brand {
    font-variation-settings: "opsz" 144, "wght" 600, "SOFT" 0;
    font-size: 1.35rem;
    letter-spacing: -0.02em;
    line-height: 1;
    white-space: nowrap;
  }
  .brand em {
    font-style: italic;
    font-variation-settings: "opsz" 144, "wght" 400, "SOFT" 100;
    color: var(--accent);
  }
  .book-title {
    font-style: italic;
    color: var(--ink-soft);
    font-size: 0.95rem;
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
  }
  .toc-toggle {
    display: none;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink);
    cursor: pointer;
    padding: 0.45rem 0.6rem;
    border-radius: 6px;
    align-items: center;
    gap: 0.4rem;
    font-family: inherit;
    font-size: 0.8rem;
    transition: background 0.15s ease;
    flex-shrink: 0;
  }
  .toc-toggle:hover { background: var(--rule-soft); }
  .toc-toggle svg { width: 16px; height: 16px; }
  .toc-toggle.visible { display: inline-flex; }

  /* ============ LAYOUT ============ */
  .layout {
    flex: 1 1 auto;
    display: flex;
    min-height: 0;
    position: relative;
  }

  /* ============ TOC ============ */
  .toc {
    flex: 0 0 250px;
    background: var(--paper-deep);
    border-right: 1px solid var(--rule);
    overflow-y: auto;
    display: none;
    flex-direction: column;
  }
  .toc.open { display: flex; }
  .toc::-webkit-scrollbar { width: 6px; }
  .toc::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 4px; }
  .toc-head {
    padding: 1.25rem 1.25rem 0.75rem;
    font-variation-settings: "opsz" 9, "wght" 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 0.68rem;
    color: var(--muted);
    border-bottom: 1px solid var(--rule-soft);
  }
  .toc-list { padding: 0.5rem 0 2rem; }
  .toc-item {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    font-family: inherit;
    cursor: pointer;
    padding: 0.55rem 1.25rem;
    color: var(--ink-soft);
    font-size: 0.88rem;
    line-height: 1.35;
    transition: background 0.12s ease, color 0.12s ease;
    border-left: 2px solid transparent;
  }
  .toc-item:hover { background: var(--rule-soft); color: var(--ink); }
  .toc-item.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: var(--accent-soft);
  }
  .toc-num {
    font-size: 0.7rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    min-width: 1.4em;
  }
  .toc-item.active .toc-num { color: var(--accent); }
  .toc-backdrop {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(28, 24, 20, 0.35);
    z-index: 9;
  }

  /* ============ READER ============ */
  .reader {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 4rem clamp(1.5rem, 7vw, 5rem);
    scroll-behavior: smooth;
    position: relative;
    min-width: 0;
  }
  .reader::-webkit-scrollbar { width: 8px; }
  .reader::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 4px; }
  .reader.dragover { background: var(--paper-soft); }
  .reader.dragover::after {
    content: "Drop it.";
    position: absolute;
    inset: 1.5rem;
    border: 2px dashed var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-size: 2rem;
    font-style: italic;
    pointer-events: none;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    gap: 1.4rem;
  }
  .empty-state h2 {
    font-variation-settings: "opsz" 144, "wght" 300, "SOFT" 50;
    font-size: clamp(2.4rem, 5vw, 4rem);
    line-height: 1.05;
    letter-spacing: -0.03em;
    max-width: 18ch;
  }
  .empty-state h2 em {
    font-style: italic;
    color: var(--accent);
  }
  .empty-state p {
    color: var(--ink-faint);
    max-width: 44ch;
    font-size: 1.05rem;
    line-height: 1.55;
  }
  .upload-btn {
    margin-top: 0.5rem;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 0.85rem 1.75rem;
    font-family: inherit;
    font-size: 1rem;
    font-variation-settings: "opsz" 14, "wght" 500;
    cursor: pointer;
    border-radius: 999px;
    transition: transform 0.15s ease, background 0.2s ease;
  }
  .upload-btn:hover { background: var(--accent); transform: translateY(-1px); }
  .file-hint {
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
  }

  .book-content {
    max-width: 38rem;
    margin: 0 auto;
    font-size: 1.2rem;
    line-height: 1.78;
    color: var(--ink-soft);
  }
  .book-content p { margin-bottom: 1.4em; text-indent: 1.8em; }
  .book-content p:first-child,
  .book-content h1 + p, .book-content h2 + p, .book-content h3 + p { text-indent: 0; }
  .book-content h1, .book-content h2, .book-content h3 {
    font-variation-settings: "opsz" 144, "wght" 600, "SOFT" 0;
    color: var(--ink);
    margin: 2.5em 0 1em;
    text-align: center;
    line-height: 1.2;
    scroll-margin-top: 2rem;
  }
  .book-content h1 { font-size: 2.1rem; }
  .book-content h2 { font-size: 1.65rem; }
  .book-content h3 { font-size: 1.3rem; font-style: italic; }

  .sentence {
    transition: background 0.35s ease, color 0.35s ease, box-shadow 0.35s ease;
    border-radius: 3px;
    padding: 0 2px;
    margin: 0 -2px;
    cursor: pointer;
  }
  .sentence:hover { color: var(--ink); }
  .sentence.active {
    background: var(--accent-soft);
    color: var(--ink);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60vh;
    color: var(--ink-faint);
    font-style: italic;
    font-size: 1.1rem;
  }

  /* ============ CONTROLS ============ */
  .controls {
    flex: 0 0 auto;
    background: var(--paper-soft);
    border-top: 1px solid var(--rule);
    padding: 0.85rem 1.5rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    z-index: 11;
  }

  /* Engine bar */
  .engine-bar {
    display: none;
    align-items: center;
    gap: 0.85rem;
    font-size: 0.82rem;
    color: var(--ink-faint);
    padding: 0.4rem 0.75rem;
    background: var(--paper-deep);
    border: 1px solid var(--rule-soft);
    border-radius: 8px;
  }
  .engine-bar.show { display: flex; }
  .engine-bar .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .engine-bar.loading .dot { background: var(--accent); animation: pulse 1.2s infinite; }
  .engine-bar.ready .dot { background: #5a7a4a; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .engine-bar .engine-msg { flex: 1; min-width: 0; }
  .engine-load-btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 0.4rem 0.9rem;
    font-family: inherit;
    font-size: 0.8rem;
    cursor: pointer;
    border-radius: 999px;
    white-space: nowrap;
  }
  .engine-load-btn:hover { background: var(--accent); }
  .engine-progress {
    flex: 1;
    height: 3px;
    background: var(--rule);
    border-radius: 999px;
    overflow: hidden;
    display: none;
  }
  .engine-bar.loading .engine-progress { display: block; }
  .engine-progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s ease;
  }

  .progress-row { display: flex; align-items: center; gap: 1rem; }
  .time {
    font-size: 0.78rem;
    color: var(--ink-faint);
    font-variant-numeric: tabular-nums;
    min-width: 4ch;
  }
  .time.right { text-align: right; }
  .progress {
    flex: 1;
    height: 3px;
    background: var(--rule);
    border-radius: 999px;
    position: relative;
    cursor: pointer;
  }
  .progress:hover { height: 5px; transition: height 0.15s ease; }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    width: 0%;
    transition: width 0.4s ease;
  }

  .transport {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 1rem;
  }
  .transport-buttons {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    justify-content: center;
  }
  .icon-btn {
    background: transparent;
    border: none;
    color: var(--ink);
    cursor: pointer;
    padding: 0.55rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .icon-btn:hover { background: var(--rule); }
  .icon-btn:active { transform: scale(0.93); }
  .icon-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .icon-btn:disabled:hover { background: transparent; }
  .icon-btn svg { width: 20px; height: 20px; }
  .play-btn {
    width: 54px;
    height: 54px;
    background: var(--ink);
    color: var(--paper);
    margin: 0 0.4rem;
    position: relative;
  }
  .play-btn:hover:not(:disabled) { background: var(--accent); }
  .play-btn svg { width: 22px; height: 22px; }
  .play-btn.busy svg { display: none !important; }
  .play-btn.busy::after {
    content: "";
    width: 20px; height: 20px;
    border: 2px solid var(--paper);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .right-tools { display: flex; justify-content: flex-end; gap: 0.4rem; }

  .settings { display: flex; gap: 1.25rem; align-items: flex-start; }
  .settings label {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    color: var(--muted);
    font-variation-settings: "opsz" 9, "wght" 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 0.65rem;
  }
  .settings select {
    background: transparent;
    border: none;
    color: var(--ink);
    font-family: inherit;
    font-size: 0.95rem;
    font-style: italic;
    cursor: pointer;
    padding: 0;
    max-width: 13rem;
  }
  .settings select:focus { outline: none; color: var(--accent); }

  .gen-status {
    font-size: 0.72rem;
    color: var(--muted);
    font-style: italic;
    text-align: center;
    min-height: 1em;
  }

  #file-input { display: none; }

  /* ============ MOBILE ============ */
  @media (max-width: 820px) {
    header { padding: 0.85rem 1rem; }
    .brand { font-size: 1.15rem; }
    .book-title { display: none; }
    .toc {
      position: absolute;
      top: 0; bottom: 0; left: 0;
      z-index: 10;
      width: min(80vw, 300px);
      flex: none;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      box-shadow: 4px 0 24px rgba(28, 24, 20, 0.15);
      display: flex;
    }
    .toc.open { transform: translateX(0); }
    .toc:not(.has-chapters) { display: none; }
    .toc-backdrop.show { display: block; }
    .reader { padding: 2rem 1.25rem; }
    .book-content { font-size: 1.08rem; line-height: 1.7; }
    .controls { padding: 0.75rem 1rem 1rem; gap: 0.6rem; }
    .transport { grid-template-columns: 1fr; gap: 0.6rem; }
    .settings { justify-content: center; gap: 1.5rem; flex-wrap: wrap; }
    .right-tools { justify-content: center; }
    .engine-bar { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <button class="toc-toggle" id="toc-toggle" title="Contents">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="12" r="1" fill="currentColor"/><circle cx="4" cy="18" r="1" fill="currentColor"/></svg>
      <span>Contents</span>
    </button>
    <div class="brand">Listening <em>Room</em></div>
  </div>
  <div class="book-title" id="book-title"></div>
</header>

<div class="layout">
  <aside class="toc" id="toc">
    <div class="toc-head">Contents</div>
    <nav class="toc-list" id="toc-list"></nav>
  </aside>
  <div class="toc-backdrop" id="toc-backdrop"></div>

  <section class="reader" id="reader">
    <div class="empty-state" id="empty-state">
      <h2>Hear what you've <em>written.</em></h2>
      <p>Drop in a manuscript and it's read back to you by a neural voice that runs entirely in your browser. One-time voice download, then it's yours — free, private, offline-capable.</p>
      <button class="upload-btn" id="open-btn">Open a document</button>
      <span class="file-hint">.docx &middot; .txt &middot; .md</span>
    </div>
    <div class="book-content" id="book-content" style="display:none;"></div>
  </section>
</div>

<footer class="controls">
  <div class="engine-bar" id="engine-bar">
    <span class="dot"></span>
    <span class="engine-msg" id="engine-msg">Neural voice not loaded</span>
    <div class="engine-progress"><div class="engine-progress-fill" id="engine-progress-fill"></div></div>
    <button class="engine-load-btn" id="engine-load-btn">Load voice engine</button>
  </div>

  <div class="progress-row">
    <span class="time" id="time-current">0%</span>
    <div class="progress" id="progress">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <span class="time right" id="time-total">&mdash;</span>
  </div>

  <div class="transport">
    <div class="settings">
      <label>
        Voice
        <select id="voice-select"></select>
      </label>
      <label>
        Speed
        <select id="rate-select">
          <option value="0.75">0.75&times;</option>
          <option value="0.9">0.9&times;</option>
          <option value="1" selected>1&times;</option>
          <option value="1.15">1.15&times;</option>
          <option value="1.3">1.3&times;</option>
          <option value="1.5">1.5&times;</option>
          <option value="1.75">1.75&times;</option>
          <option value="2">2&times;</option>
        </select>
      </label>
    </div>
    <div class="transport-buttons">
      <button class="icon-btn" id="prev-btn" title="Previous sentence (&larr;)" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="18 19 8 12 18 5"/><rect x="4" y="5" width="2" height="14"/></svg>
      </button>
      <button class="icon-btn play-btn" id="play-btn" disabled title="Play (space)">
        <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20"/></svg>
        <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="icon-btn" id="next-btn" title="Next sentence (&rarr;)" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 5 16 12 6 19"/><rect x="18" y="5" width="2" height="14"/></svg>
      </button>
    </div>
    <div class="right-tools">
      <button class="icon-btn" id="open-icon-btn" title="Open new document">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </button>
    </div>
  </div>

  <div class="gen-status" id="gen-status"></div>
</footer>

<input type="file" id="file-input" accept=".docx,.txt,.md" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script type="module">
import { KokoroTTS } from "https://cdn.jsdelivr.net/npm/kokoro-js@1/+esm";

(function() {
  'use strict';

  /* ============ STATE ============ */
  let tts = null;
  let engineState = 'idle';      // idle | loading | ready | error
  let sentences = [];
  let chapters = [];
  let currentIndex = 0;
  let isPlaying = false;
  let bookKey = null;
  let genToken = 0;              // bumped on voice change / new book
  let genChain = Promise.resolve();
  let tocOpenDesktop = true;

  const PREFETCH = 6;            // sentences to generate ahead
  const CACHE_MAX = 80;          // max cached audio clips

  const audioCache = new Map();  // idx -> object URL

  const isMobile = () => window.matchMedia('(max-width: 820px)').matches;

  /* Kokoro voices, curated. British female first per the owner's taste. */
  const VOICES = [
    { id: 'bf_emma',     label: 'Emma \u00b7 British Female' },
    { id: 'bf_isabella', label: 'Isabella \u00b7 British Female' },
    { id: 'bf_alice',    label: 'Alice \u00b7 British Female' },
    { id: 'bf_lily',     label: 'Lily \u00b7 British Female' },
    { id: 'bm_george',   label: 'George \u00b7 British Male' },
    { id: 'bm_fable',    label: 'Fable \u00b7 British Male' },
    { id: 'bm_daniel',   label: 'Daniel \u00b7 British Male' },
    { id: 'bm_lewis',    label: 'Lewis \u00b7 British Male' },
    { id: 'af_heart',    label: 'Heart \u00b7 American Female' },
    { id: 'af_bella',    label: 'Bella \u00b7 American Female' },
    { id: 'af_nicole',   label: 'Nicole \u00b7 American Female' },
    { id: 'af_sarah',    label: 'Sarah \u00b7 American Female' },
    { id: 'af_sky',      label: 'Sky \u00b7 American Female' },
    { id: 'af_nova',     label: 'Nova \u00b7 American Female' },
    { id: 'am_michael',  label: 'Michael \u00b7 American Male' },
    { id: 'am_puck',     label: 'Puck \u00b7 American Male' },
    { id: 'am_adam',     label: 'Adam \u00b7 American Male' },
    { id: 'am_echo',     label: 'Echo \u00b7 American Male' },
  ];

  const $ = id => document.getElementById(id);
  const el = {
    reader:       $('reader'),
    emptyState:   $('empty-state'),
    content:      $('book-content'),
    bookTitle:    $('book-title'),
    playBtn:      $('play-btn'),
    prevBtn:      $('prev-btn'),
    nextBtn:      $('next-btn'),
    playIcon:     $('play-icon'),
    pauseIcon:    $('pause-icon'),
    voiceSelect:  $('voice-select'),
    rateSelect:   $('rate-select'),
    progress:     $('progress'),
    progressFill: $('progress-fill'),
    timeCurrent:  $('time-current'),
    timeTotal:    $('time-total'),
    fileInput:    $('file-input'),
    openBtn:      $('open-btn'),
    openIconBtn:  $('open-icon-btn'),
    toc:          $('toc'),
    tocList:      $('toc-list'),
    tocToggle:    $('toc-toggle'),
    tocBackdrop:  $('toc-backdrop'),
    engineBar:    $('engine-bar'),
    engineMsg:    $('engine-msg'),
    engineLoadBtn: $('engine-load-btn'),
    engineProgressFill: $('engine-progress-fill'),
    genStatus:    $('gen-status'),
  };

  /* Single persistent audio element — critical for iOS gesture chain */
  const player = new Audio();
  player.preload = 'auto';

  /* ============ PREFERENCES (localStorage — fine on own hosting) ============ */
  function prefGet(key) {
    try { return localStorage.getItem(key); } catch (e) { return null; }
  }
  function prefSet(key, value) {
    try { localStorage.setItem(key, value); } catch (e) {}
  }
  function sanitizeKey(s) { return s.replace(/[\s\/\\'"]/g, '_').slice(0, 160); }

  /* ============ VOICE SELECT ============ */
  el.voiceSelect.innerHTML = '';
  VOICES.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.id;
    opt.textContent = v.label;
    el.voiceSelect.appendChild(opt);
  });
  const savedVoice = prefGet('lr_voice');
  el.voiceSelect.value = (savedVoice && VOICES.some(v => v.id === savedVoice))
    ? savedVoice : 'bf_emma';
  const savedRate = prefGet('lr_rate');
  if (savedRate) el.rateSelect.value = savedRate;

  el.voiceSelect.addEventListener('change', () => {
    prefSet('lr_voice', el.voiceSelect.value);
    // New voice — old audio is wrong. Clear cache and regenerate.
    invalidateAudio();
    if (isPlaying) playIndex(currentIndex);
  });

  el.rateSelect.addEventListener('change', () => {
    prefSet('lr_rate', el.rateSelect.value);
    player.playbackRate = parseFloat(el.rateSelect.value) || 1;
  });

  function invalidateAudio() {
    genToken++;
    genChain = Promise.resolve();
    for (const url of audioCache.values()) URL.revokeObjectURL(url);
    audioCache.clear();
  }

  /* ============ ENGINE LOADING ============ */
  function setEngine(state, msg) {
    engineState = state;
    el.engineBar.className = 'engine-bar show ' + state;
    el.engineMsg.textContent = msg;
    el.engineLoadBtn.style.display = (state === 'idle' || state === 'error') ? '' : 'none';
  }

  async function loadEngine() {
    if (tts || engineState === 'loading') return tts;

    const useWebGPU = !!navigator.gpu && !isMobile();
    const device = useWebGPU ? 'webgpu' : 'wasm';
    const dtype = useWebGPU ? 'fp32' : 'q8';
    const sizeHint = useWebGPU ? '~330 MB' : '~90 MB';

    setEngine('loading', `Downloading voice engine (${sizeHint}, one-time)\u2026`);

    const fileProgress = {};
    const onProgress = (p) => {
      if (p.status === 'progress' && p.total) {
        fileProgress[p.file] = { loaded: p.loaded || 0, total: p.total || 0 };
        let loaded = 0, total = 0;
        for (const f of Object.values(fileProgress)) { loaded += f.loaded; total += f.total; }
        if (total > 0) {
          const pct = Math.min(100, (loaded / total) * 100);
          el.engineProgressFill.style.width = pct + '%';
          el.engineMsg.textContent =
            `Downloading voice engine\u2026 ${(loaded / 1048576).toFixed(0)} / ${(total / 1048576).toFixed(0)} MB`;
        }
      }
    };

    try {
      tts = await KokoroTTS.from_pretrained('onnx-community/Kokoro-82M-v1.0-ONNX', {
        dtype, device,
        progress_callback: onProgress,
      });
      setEngine('ready', `Neural voice ready \u00b7 ${useWebGPU ? 'GPU' : 'CPU'}`);
      prefSet('lr_engine_loaded', '1');
      // Fade the bar out after a moment
      setTimeout(() => {
        if (engineState === 'ready') el.engineBar.classList.remove('show');
      }, 4000);
      return tts;
    } catch (err) {
      console.error('Engine load failed:', err);
      tts = null;
      setEngine('error', 'Voice engine failed to load \u2014 check connection and retry.');
      throw err;
    }
  }

  el.engineLoadBtn.addEventListener('click', () => loadEngine().catch(() => {}));

  // Show the bar on first visit; auto-load silently if they've loaded before
  setEngine('idle', 'Neural voice not loaded \u2014 one-time download required');
  if (prefGet('lr_engine_loaded') === '1') {
    loadEngine().catch(() => {});
  }

  /* ============ WAV ENCODING FALLBACK ============ */
  function rawToWavBlob(raw) {
    if (typeof raw.toBlob === 'function') {
      try { return raw.toBlob(); } catch (e) { /* fall through */ }
    }
    return encodeWav(raw.audio, raw.sampling_rate || 24000);
  }

  function encodeWav(float32, sampleRate) {
    const len = float32.length;
    const buffer = new ArrayBuffer(44 + len * 2);
    const view = new DataView(buffer);
    const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
    writeStr(0, 'RIFF');
    view.setUint32(4, 36 + len * 2, true);
    writeStr(8, 'WAVE');
    writeStr(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    writeStr(36, 'data');
    view.setUint32(40, len * 2, true);
    let off = 44;
    for (let i = 0; i < len; i++) {
      const s = Math.max(-1, Math.min(1, float32[i]));
      view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      off += 2;
    }
    return new Blob([buffer], { type: 'audio/wav' });
  }

  /* ============ AUDIO GENERATION PIPELINE ============ */
  function queueGenerate(idx, token) {
    genChain = genChain.then(async () => {
      if (token !== genToken) return;
      if (idx < 0 || idx >= sentences.length) return;
      if (audioCache.has(idx)) return;
      if (!tts) return;
      const text = sentences[idx];
      if (!text || !text.trim()) return;
      const raw = await tts.generate(text, { voice: el.voiceSelect.value });
      if (token !== genToken) return;
      const blob = rawToWavBlob(raw);
      audioCache.set(idx, URL.createObjectURL(blob));
      pruneCache();
    }).catch(err => {
      console.warn('Generation failed for sentence', idx, err);
    });
    return genChain;
  }

  function pruneCache() {
    if (audioCache.size <= CACHE_MAX) return;
    const entries = [...audioCache.keys()]
      .sort((a, b) => Math.abs(b - currentIndex) - Math.abs(a - currentIndex));
    while (audioCache.size > CACHE_MAX && entries.length) {
      const idx = entries.shift();
      URL.revokeObjectURL(audioCache.get(idx));
      audioCache.delete(idx);
    }
  }

  async function getAudio(idx) {
    if (!audioCache.has(idx)) {
      await queueGenerate(idx, genToken);
    }
    return audioCache.get(idx) || null;
  }

  function prefetch(fromIdx) {
    for (let i = fromIdx; i <= Math.min(fromIdx + PREFETCH, sentences.length - 1); i++) {
      queueGenerate(i, genToken);
    }
  }

  /* ============ PLAYBACK ============ */
  function setBusy(busy) {
    el.playBtn.classList.toggle('busy', busy);
  }

  function setGenStatus(msg) {
    el.genStatus.textContent = msg || '';
  }

  async function playIndex(idx) {
    if (idx >= sentences.length) { pause(); return; }
    if (idx < 0) idx = 0;
    currentIndex = idx;
    highlightSentence(idx, true);
    updateProgress();
    updateMediaSession();

    if (!tts) {
      try {
        setBusy(true);
        await loadEngine();
      } catch (e) {
        setBusy(false);
        return;
      }
    }

    const token = genToken;
    let url = audioCache.get(idx);
    if (!url) {
      setBusy(true);
      setGenStatus('Generating\u2026');
      url = await getAudio(idx);
      setGenStatus('');
      setBusy(false);
      if (token !== genToken || !isPlaying || currentIndex !== idx) return;
    }
    if (!url) {
      // Generation failed for this sentence — skip it rather than dying
      playIndex(idx + 1);
      return;
    }

    player.src = url;
    player.playbackRate = parseFloat(el.rateSelect.value) || 1;
    try {
      await player.play();
    } catch (err) {
      console.warn('play() blocked:', err);
      pause();
      return;
    }
    savePosition();
    prefetch(idx + 1);
  }

  player.addEventListener('ended', () => {
    if (isPlaying) playIndex(currentIndex + 1);
  });
  player.addEventListener('error', () => {
    if (isPlaying) playIndex(currentIndex + 1);
  });

  function togglePlay() {
    if (sentences.length === 0) return;
    if (isPlaying) pause();
    else play();
  }

  function play() {
    if (sentences.length === 0) return;
    if (currentIndex >= sentences.length) currentIndex = 0;
    isPlaying = true;
    el.playIcon.style.display = 'none';
    el.pauseIcon.style.display = 'block';
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
    // Resume mid-sentence if we have a paused src for this index
    if (player.src && player.paused && !player.ended && player.currentTime > 0) {
      player.play().catch(() => playIndex(currentIndex));
    } else {
      playIndex(currentIndex);
    }
  }

  function pause() {
    isPlaying = false;
    el.playIcon.style.display = 'block';
    el.pauseIcon.style.display = 'none';
    setBusy(false);
    setGenStatus('');
    player.pause();
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
  }

  function stopPlayback() {
    pause();
    player.removeAttribute('src');
    player.load();
  }

  function step(dir) {
    if (sentences.length === 0) return;
    const idx = Math.max(0, Math.min(currentIndex + dir, sentences.length - 1));
    if (isPlaying) {
      playIndex(idx);
    } else {
      currentIndex = idx;
      highlightSentence(idx, true);
      updateProgress();
      savePosition();
    }
  }

  function jumpTo(idx) {
    if (sentences.length === 0) return;
    idx = Math.max(0, Math.min(idx, sentences.length - 1));
    if (isPlaying) {
      playIndex(idx);
    } else {
      currentIndex = idx;
      highlightSentence(idx, true);
      updateProgress();
      savePosition();
    }
  }

  /* ============ MEDIA SESSION (lock screen controls) ============ */
  function updateMediaSession() {
    if (!('mediaSession' in navigator)) return;
    let chapterTitle = '';
    for (const ch of chapters) {
      if (ch.index <= currentIndex) chapterTitle = ch.title;
      else break;
    }
    try {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: el.bookTitle.textContent || 'Listening Room',
        artist: chapterTitle || 'Listening Room',
        album: 'Listening Room',
      });
    } catch (e) {}
  }

  if ('mediaSession' in navigator) {
    try {
      navigator.mediaSession.setActionHandler('play', play);
      navigator.mediaSession.setActionHandler('pause', pause);
      navigator.mediaSession.setActionHandler('previoustrack', () => step(-1));
      navigator.mediaSession.setActionHandler('nexttrack', () => step(1));
      navigator.mediaSession.setActionHandler('seekbackward', () => step(-1));
      navigator.mediaSession.setActionHandler('seekforward', () => step(1));
    } catch (e) {}
  }

  /* ============ FILE HANDLING ============ */
  el.openBtn.addEventListener('click', () => el.fileInput.click());
  el.openIconBtn.addEventListener('click', () => el.fileInput.click());

  el.fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (file) await loadFile(file);
    e.target.value = '';
  });

  el.reader.addEventListener('dragover', (e) => {
    e.preventDefault();
    el.reader.classList.add('dragover');
  });
  el.reader.addEventListener('dragleave', (e) => {
    if (e.target === el.reader) el.reader.classList.remove('dragover');
  });
  el.reader.addEventListener('drop', async (e) => {
    e.preventDefault();
    el.reader.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) await loadFile(file);
  });

  async function loadFile(file) {
    stopPlayback();
    invalidateAudio();

    el.bookTitle.textContent = file.name.replace(/\.[^.]+$/, '');
    el.emptyState.style.display = 'none';
    el.content.style.display = 'block';
    el.content.innerHTML = '<div class="loading">Opening\u2026</div>';

    bookKey = 'lr_pos_' + sanitizeKey(file.name + '_' + file.size);

    const ext = (file.name.split('.').pop() || '').toLowerCase();
    let blocks = [];

    try {
      if (ext === 'docx') {
        const arrayBuffer = await file.arrayBuffer();
        const result = await mammoth.convertToHtml({ arrayBuffer });
        blocks = blocksFromHtml(result.value);
      } else {
        const text = await file.text();
        blocks = blocksFromPlainText(text, ext === 'md');
      }
    } catch (err) {
      el.content.innerHTML =
        '<div class="loading">Couldn\u2019t open this file. ' +
        (err && err.message ? escapeHtml(err.message) : '') + '</div>';
      return;
    }

    if (blocks.length === 0) {
      el.content.innerHTML = '<div class="loading">This file is empty.</div>';
      return;
    }

    if (!blocks.some(b => b.type === 'heading')) {
      blocks = detectHeadingsHeuristically(blocks);
    }

    renderBlocks(blocks);
    buildToc();

    const savedPos = parseInt(prefGet(bookKey) || '', 10);
    if (!isNaN(savedPos) && savedPos > 0 && savedPos < sentences.length) {
      currentIndex = savedPos;
      highlightSentence(currentIndex, false);
      updateProgress();
      setTimeout(() => scrollToActive(true), 80);
    }

    enableControls();
    updateMediaSession();
    // Start warming the buffer if engine is already up
    if (tts) prefetch(currentIndex);
  }

  /* ============ PARSING ============ */
  function blocksFromHtml(html) {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const blocks = [];
    const nodes = doc.body.querySelectorAll('h1,h2,h3,h4,h5,h6,p,li,blockquote');
    nodes.forEach(node => {
      const text = (node.textContent || '').replace(/\s+/g, ' ').trim();
      if (!text) return;
      const tag = node.tagName.toLowerCase();
      if (/^h[1-6]$/.test(tag)) {
        blocks.push({ type: 'heading', level: Math.min(3, parseInt(tag[1], 10)), text });
      } else {
        blocks.push({ type: 'para', text });
      }
    });
    return blocks;
  }

  function blocksFromPlainText(text, isMarkdown) {
    text = text.replace(/\r\n/g, '\n').replace(/\n{3,}/g, '\n\n');
    const paragraphs = text.split(/\n\s*\n/).map(p => p.trim()).filter(Boolean);
    const blocks = [];
    paragraphs.forEach(para => {
      if (isMarkdown) {
        const m = para.match(/^(#{1,6})\s+(.+)$/m);
        if (m && para.split('\n').length === 1) {
          blocks.push({
            type: 'heading',
            level: Math.min(3, m[1].length),
            text: m[2].replace(/#+\s*$/, '').trim()
          });
          return;
        }
      }
      const cleaned = para.replace(/\n+/g, ' ').replace(/\s+/g, ' ').trim();
      if (cleaned) blocks.push({ type: 'para', text: cleaned });
    });
    return blocks;
  }

  const CHAPTER_RE = /^(chapter|part|book|act|prologue|epilogue|interlude|afterword|foreword|preface|introduction|acknowledg)/i;
  const ROMAN_OR_NUM_RE = /^([IVXLC]+|\d+)\.?$/;

  function detectHeadingsHeuristically(blocks) {
    return blocks.map(b => {
      if (b.type !== 'para') return b;
      const t = b.text;
      const looksLikeChapter = CHAPTER_RE.test(t) && t.length < 60;
      const looksLikeNumber = ROMAN_OR_NUM_RE.test(t);
      const shortAllCaps = t.length < 60 && !/[.!?,;:]$/.test(t) &&
        t.split(/\s+/).length <= 8 && t === t.toUpperCase() && /[A-Z]/.test(t);
      if (looksLikeChapter || looksLikeNumber || shortAllCaps) {
        return { type: 'heading', level: (looksLikeChapter || looksLikeNumber) ? 1 : 2, text: t };
      }
      return b;
    });
  }

  /* ============ RENDER ============ */
  function renderBlocks(blocks) {
    sentences = [];
    chapters = [];
    const fragments = [];
    const segmenter = (typeof Intl !== 'undefined' && Intl.Segmenter)
      ? new Intl.Segmenter('en', { granularity: 'sentence' })
      : null;

    blocks.forEach(b => {
      if (b.type === 'heading') {
        const idx = sentences.length;
        sentences.push(b.text);
        chapters.push({ title: b.text, index: idx });
        const tag = 'h' + (b.level || 2);
        fragments.push(
          `<${tag} id="ch-${chapters.length - 1}">` +
          `<span class="sentence" data-idx="${idx}">${escapeHtml(b.text)}</span>` +
          `</${tag}>`
        );
        return;
      }
      let paraSentences;
      if (segmenter) {
        paraSentences = [...segmenter.segment(b.text)]
          .map(s => s.segment.trim()).filter(Boolean);
      } else {
        paraSentences = (b.text.match(/[^.!?]+[.!?]*\s*/g) || [b.text])
          .map(s => s.trim()).filter(Boolean);
      }
      let html = '<p>';
      paraSentences.forEach(sent => {
        const idx = sentences.length;
        sentences.push(sent);
        html += `<span class="sentence" data-idx="${idx}">${escapeHtml(sent)}</span> `;
      });
      html += '</p>';
      fragments.push(html);
    });

    el.content.innerHTML = fragments.join('');
    currentIndex = 0;
    updateProgress();
  }

  function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  el.content.addEventListener('click', (e) => {
    const span = e.target.closest('.sentence');
    if (span) {
      const idx = parseInt(span.dataset.idx, 10);
      if (!isNaN(idx)) jumpTo(idx);
    }
  });

  /* ============ TOC ============ */
  function buildToc() {
    el.tocList.innerHTML = '';
    const has = chapters.length > 0;
    el.toc.classList.toggle('has-chapters', has);
    el.tocToggle.classList.toggle('visible', has);
    if (!has) { el.toc.classList.remove('open'); return; }

    chapters.forEach((ch, i) => {
      const btn = document.createElement('button');
      btn.className = 'toc-item';
      btn.dataset.chapter = i;
      btn.innerHTML =
        `<span class="toc-num">${i + 1}</span>` +
        `<span>${escapeHtml(ch.title)}</span>`;
      btn.addEventListener('click', () => {
        jumpTo(ch.index);
        if (isMobile()) closeToc();
      });
      el.tocList.appendChild(btn);
    });

    if (!isMobile() && tocOpenDesktop) el.toc.classList.add('open');
    updateTocHighlight();
  }

  function updateTocHighlight() {
    if (chapters.length === 0) return;
    let active = -1;
    for (let i = 0; i < chapters.length; i++) {
      if (chapters[i].index <= currentIndex) active = i;
      else break;
    }
    el.tocList.querySelectorAll('.toc-item').forEach((btn, i) => {
      btn.classList.toggle('active', i === active);
    });
    if (active >= 0 && el.toc.classList.contains('open')) {
      const btn = el.tocList.querySelector(`.toc-item[data-chapter="${active}"]`);
      if (btn) btn.scrollIntoView({ block: 'nearest' });
    }
  }

  function openToc() {
    el.toc.classList.add('open');
    if (isMobile()) el.tocBackdrop.classList.add('show');
    else tocOpenDesktop = true;
  }
  function closeToc() {
    el.toc.classList.remove('open');
    el.tocBackdrop.classList.remove('show');
    if (!isMobile()) tocOpenDesktop = false;
  }
  el.tocToggle.addEventListener('click', () => {
    el.toc.classList.contains('open') ? closeToc() : openToc();
  });
  el.tocBackdrop.addEventListener('click', closeToc);

  /* ============ UI HELPERS ============ */
  function enableControls() {
    el.playBtn.disabled = false;
    el.prevBtn.disabled = false;
    el.nextBtn.disabled = false;
  }

  function highlightSentence(idx, scroll) {
    const prev = el.content.querySelector('.sentence.active');
    if (prev) prev.classList.remove('active');
    const next = el.content.querySelector(`.sentence[data-idx="${idx}"]`);
    if (next) {
      next.classList.add('active');
      if (scroll) scrollToActive();
    }
  }

  function scrollToActive(instant) {
    const node = el.content.querySelector('.sentence.active');
    if (node) {
      node.scrollIntoView({ behavior: instant ? 'auto' : 'smooth', block: 'center' });
    }
  }

  el.progress.addEventListener('click', (e) => {
    if (sentences.length === 0) return;
    const rect = el.progress.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    jumpTo(Math.floor(pct * sentences.length));
  });

  function updateProgress() {
    const pct = sentences.length ? (currentIndex / sentences.length) * 100 : 0;
    el.progressFill.style.width = pct + '%';
    el.timeCurrent.textContent = Math.floor(pct) + '%';
    el.timeTotal.textContent = sentences.length ? sentences.length + ' lines' : '\u2014';
    updateTocHighlight();
  }

  function savePosition() {
    if (bookKey) prefSet(bookKey, String(currentIndex));
  }

  /* ============ BUTTONS / KEYBOARD ============ */
  el.playBtn.addEventListener('click', togglePlay);
  el.prevBtn.addEventListener('click', () => step(-1));
  el.nextBtn.addEventListener('click', () => step(1));

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    else if (e.code === 'ArrowRight') { e.preventDefault(); step(1); }
    else if (e.code === 'ArrowLeft') { e.preventDefault(); step(-1); }
  });

  window.addEventListener('beforeunload', () => {
    try { player.pause(); } catch (e) {}
  });

})();
</script>
</body>
</html>
